<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 24" width="1200" height="24" preserveAspectRatio="none">
  <defs>
    <linearGradient id="frameTopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ffe1"/>
      <stop offset="50%" stop-color="#8338ec"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
    <filter id="frameTopGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="10" width="1200" height="2" fill="url(#frameTopGrad)" filter="url(#frameTopGlow)"/>

  <g transform="translate(18 12)">
    <circle cx="0" cy="0" r="5" fill="#00ffe1"/>
    <circle cx="18" cy="0" r="5" fill="#8338ec"/>
    <circle cx="36" cy="0" r="5" fill="#ff006e"/>
  </g>

  <g font-family="JetBrains Mono, Consolas, monospace" font-size="10" font-weight="700" letter-spacing="2" fill="#00ffe1" opacity="0.75">
    <text x="1180" y="16" text-anchor="end">◉ REC</text>
  </g>
</svg>
